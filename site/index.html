<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT Image 2 Visual Atlas</title>
<meta name="description" content="一个基于 awesome-gpt-image-2 数据整理的 GPT Image 2 案例视觉图谱。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f3ec;
  --panel: #fffdf8;
  --panel-strong: #ffffff;
  --ink: #1c1a17;
  --muted: #6f6a61;
  --faint: #a49b8e;
  --line: #e2d8ca;
  --line-soft: #eee6da;
  --accent: #b9432f;
  --accent-2: #23606c;
  --accent-3: #d39a22;
  --shadow: 0 16px 48px rgba(72, 51, 33, 0.12);
  --shadow-soft: 0 8px 24px rgba(72, 51, 33, 0.08);
  --radius: 8px;
  --font-body: "DM Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-display: "Noto Serif SC", "Source Han Serif SC", serif;
  --font-mono: "JetBrains Mono", Consolas, monospace;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--font-body);
  color: var(--ink);
  background:
    linear-gradient(90deg, rgba(185,67,47,0.055) 0 1px, transparent 1px 72px),
    linear-gradient(0deg, rgba(35,96,108,0.045) 0 1px, transparent 1px 72px),
    radial-gradient(circle at 78% 8%, rgba(211,154,34,0.16), transparent 26rem),
    var(--bg);
  overflow-x: hidden;
}

button, input { font: inherit; }
button { cursor: pointer; }

.app {
  width: min(1680px, 100%);
  margin: 0 auto;
  padding: 24px;
}

.topbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 24px;
  align-items: end;
  padding: 18px 0 24px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

h1 {
  margin: 0;
  font-family: var(--font-display);
  font-size: clamp(36px, 6vw, 84px);
  line-height: 0.96;
  letter-spacing: 0;
}

.subtitle {
  max-width: 760px;
  margin: 16px 0 0;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.8;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(92px, 1fr));
  gap: 10px;
  min-width: 330px;
}

.stat {
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.62);
  padding: 14px 16px;
}

.stat strong {
  display: block;
  font-family: var(--font-display);
  font-size: 30px;
  line-height: 1;
}

.stat span {
  color: var(--muted);
  font-size: 12px;
}

.workbench {
  display: grid;
  grid-template-columns: 270px minmax(0, 1fr);
  gap: 24px;
  align-items: start;
  padding-top: 24px;
}

.sidebar {
  position: sticky;
  top: 16px;
  max-height: calc(100vh - 32px);
  display: flex;
  flex-direction: column;
  border: 1px solid var(--line);
  background: rgba(255,253,248,0.9);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(16px);
  overflow: hidden;
}

.sidebar-head {
  padding: 16px;
  border-bottom: 1px solid var(--line-soft);
}

.sidebar-title {
  margin: 0 0 8px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.search {
  position: relative;
}

.search input {
  width: 100%;
  min-height: 42px;
  padding: 10px 38px 10px 12px;
  border: 1px solid var(--line);
  background: var(--panel-strong);
  color: var(--ink);
  outline: none;
}

.search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(185,67,47,0.12);
}

.clear-search {
  position: absolute;
  top: 50%;
  right: 8px;
  transform: translateY(-50%);
  width: 26px;
  height: 26px;
  border: 0;
  background: transparent;
  color: var(--faint);
  display: none;
}

.clear-search.visible { display: grid; place-items: center; }

.view-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}

.view-tab {
  min-height: 36px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--muted);
  font-weight: 700;
}

.view-tab.active {
  color: #fff;
  background: var(--accent);
  border-color: var(--accent);
}

.category-list {
  overflow: auto;
  padding: 10px;
}

.cat {
  width: 100%;
  min-height: 42px;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  padding: 8px 10px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  text-align: left;
}

.cat:hover {
  background: rgba(185,67,47,0.06);
  color: var(--ink);
}

.cat.active {
  border-color: rgba(185,67,47,0.36);
  background: #fff;
  color: var(--accent);
  box-shadow: inset 3px 0 0 var(--accent);
}

.cat-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 700;
}

.cat-count {
  color: var(--faint);
  font-size: 12px;
  font-family: var(--font-mono);
}

.content {
  min-width: 0;
}

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
  color: var(--muted);
  font-size: 13px;
}

.toolbar strong { color: var(--ink); }

.gallery {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
}

.card {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line-soft);
  background: var(--panel-strong);
  box-shadow: 0 1px 0 rgba(255,255,255,0.75);
  transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
}

.card:hover {
  transform: translateY(-3px);
  border-color: rgba(185,67,47,0.35);
  box-shadow: var(--shadow-soft);
}

.thumb {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  background: var(--line-soft);
}

.card-body {
  padding: 12px;
}

.case-id {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 2px 7px;
  background: var(--ink);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 11px;
}

.card h2 {
  min-height: 42px;
  margin: 10px 0 8px;
  font-family: var(--font-display);
  font-size: 15px;
  line-height: 1.42;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.source {
  color: var(--faint);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.templates {
  display: none;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.template-card {
  border: 1px solid var(--line);
  background: var(--panel-strong);
  padding: 18px;
}

.template-card h2 {
  margin: 0 0 10px;
  font-family: var(--font-display);
  font-size: 21px;
}

.template-card p {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}

.template-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.mini-btn {
  min-height: 34px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 700;
}

.mini-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.empty {
  grid-column: 1 / -1;
  border: 1px dashed var(--line);
  padding: 70px 20px;
  text-align: center;
  color: var(--muted);
  background: rgba(255,255,255,0.42);
}

.modal-layer {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(21,17,14,0.78);
}

.modal-layer.open { display: flex; }

.modal {
  width: min(1180px, 100%);
  max-height: 92vh;
  display: grid;
  grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1fr);
  background: var(--panel-strong);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.modal-media {
  min-height: 420px;
  background: #171411;
  display: grid;
  place-items: center;
}

.modal-media img {
  max-width: 100%;
  max-height: 92vh;
  object-fit: contain;
}

.modal-info {
  overflow: auto;
  max-height: 92vh;
  padding: 26px;
}

.modal-info h2 {
  margin: 8px 0 10px;
  font-family: var(--font-display);
  font-size: 26px;
  line-height: 1.25;
}

.modal-meta {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.8;
}

.prompt {
  margin-top: 18px;
  padding: 16px;
  background: #1f1d1a;
  color: #f4eee5;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
}

.modal-close {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 60;
  width: 42px;
  height: 42px;
  border: 1px solid rgba(255,255,255,0.24);
  background: rgba(0,0,0,0.46);
  color: #fff;
  font-size: 22px;
}

.modal-nav {
  position: fixed;
  top: 50%;
  z-index: 60;
  width: 44px;
  height: 44px;
  border: 1px solid rgba(255,255,255,0.24);
  background: rgba(0,0,0,0.46);
  color: #fff;
  font-size: 26px;
}

.modal-nav.prev { left: 18px; }
.modal-nav.next { right: 18px; top: calc(50% + 56px); }

.toast {
  position: fixed;
  left: 50%;
  bottom: 26px;
  z-index: 80;
  transform: translateX(-50%);
  padding: 10px 16px;
  background: var(--ink);
  color: #fff;
  opacity: 0;
  pointer-events: none;
  transition: opacity 160ms ease;
}

.toast.show { opacity: 1; }

.footer {
  margin-top: 42px;
  padding: 24px 0 8px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 13px;
}

.footer a { color: var(--accent-2); }

@media (max-width: 1320px) {
  .gallery { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}

@media (max-width: 980px) {
  .app { padding: 16px; }
  .topbar { grid-template-columns: 1fr; }
  .stats { min-width: 0; }
  .workbench { display: block; }
  .sidebar {
    position: sticky;
    top: 0;
    z-index: 20;
    max-height: none;
    margin: 0 -16px 18px;
    border-left: 0;
    border-right: 0;
    box-shadow: none;
  }
  .category-list {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 10px 16px;
  }
  .cat {
    width: auto;
    min-width: max-content;
    grid-template-columns: 24px auto auto;
    margin: 0;
  }
  .gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .templates { grid-template-columns: 1fr; }
  .modal {
    grid-template-columns: 1fr;
    overflow: auto;
  }
  .modal-media { min-height: 240px; }
  .modal-info { max-height: none; }
}

@media (max-width: 620px) {
  .app { padding: 12px; }
  .gallery { grid-template-columns: 1fr; }
  .stats { grid-template-columns: 1fr 1fr; }
  .stat:last-child { grid-column: 1 / -1; }
  .toolbar { display: block; }
  .modal-layer { padding: 8px; }
  .modal-close { top: 10px; right: 10px; }
  .modal-nav { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <div class="eyebrow">Independent visual index</div>
      <h1>GPT Image 2<br>Visual Atlas</h1>
      <p class="subtitle">基于 awesome-gpt-image-2 案例数据整理的可视化浏览器。左侧按类型筛选，右侧快速浏览图片、来源和提示词，适合查找灵感、复用模板与做提示词研究。</p>
    </div>
    <div class="stats" aria-label="数据概览">
      <div class="stat"><strong id="statCases">--</strong><span>案例</span></div>
      <div class="stat"><strong id="statCats">--</strong><span>分类</span></div>
      <div class="stat"><strong id="statTpls">--</strong><span>模板</span></div>
    </div>
  </header>

  <main class="workbench">
    <aside class="sidebar" aria-label="筛选与视图">
      <div class="sidebar-head">
        <p class="sidebar-title">Control</p>
        <div class="search">
          <input id="searchInput" type="search" placeholder="搜索标题、来源或提示词" autocomplete="off">
          <button class="clear-search" id="clearSearch" aria-label="清空搜索">x</button>
        </div>
        <div class="view-tabs" role="tablist">
          <button class="view-tab active" id="galleryTab" type="button">Gallery</button>
          <button class="view-tab" id="templateTab" type="button">Templates</button>
        </div>
      </div>
      <div class="category-list" id="categoryList" role="tablist"></div>
    </aside>

    <section class="content">
      <div class="toolbar">
        <div><strong id="resultCount">--</strong> results <span id="activeLabel"></span></div>
        <div id="generatedAt"></div>
      </div>
      <div class="gallery" id="gallery"></div>
      <div class="templates" id="templates"></div>
    </section>
  </main>

  <footer class="footer">
    <p>数据来源于 <a href="https://github.com/freestylefly/awesome-gpt-image-2" target="_blank" rel="noopener noreferrer">freestylefly/awesome-gpt-image-2</a>。本项目是独立整理与可视化版本，感谢原项目作者与社区贡献者。</p>
  </footer>
</div>

<div class="modal-layer" id="modalLayer" role="dialog" aria-modal="true" aria-label="案例详情">
  <button class="modal-close" id="modalClose" type="button" aria-label="关闭">x</button>
  <button class="modal-nav prev" id="modalPrev" type="button" aria-label="上一个">‹</button>
  <button class="modal-nav next" id="modalNext" type="button" aria-label="下一个">›</button>
  <article class="modal">
    <div class="modal-media"><img id="modalImage" src="" alt=""></div>
    <div class="modal-info" id="modalInfo"></div>
  </article>
</div>

<div class="toast" id="toast" aria-live="polite">已复制</div>

<script>
(() => {
  const state = {
    data: null,
    cases: [],
    templates: [],
    categories: {},
    activeCategory: "all",
    query: "",
    view: "gallery",
    filtered: [],
    modalIndex: -1
  };

  const el = {
    statCases: document.getElementById("statCases"),
    statCats: document.getElementById("statCats"),
    statTpls: document.getElementById("statTpls"),
    generatedAt: document.getElementById("generatedAt"),
    resultCount: document.getElementById("resultCount"),
    activeLabel: document.getElementById("activeLabel"),
    categoryList: document.getElementById("categoryList"),
    gallery: document.getElementById("gallery"),
    templates: document.getElementById("templates"),
    searchInput: document.getElementById("searchInput"),
    clearSearch: document.getElementById("clearSearch"),
    galleryTab: document.getElementById("galleryTab"),
    templateTab: document.getElementById("templateTab"),
    modalLayer: document.getElementById("modalLayer"),
    modalClose: document.getElementById("modalClose"),
    modalPrev: document.getElementById("modalPrev"),
    modalNext: document.getElementById("modalNext"),
    modalImage: document.getElementById("modalImage"),
    modalInfo: document.getElementById("modalInfo"),
    toast: document.getElementById("toast")
  };

  const catIcons = {
    all: "All",
    ui: "UI",
    infographic: "Info",
    poster: "Type",
    ecommerce: "Shop",
    branding: "Brand",
    architecture: "Arch",
    photography: "Photo",
    illustration: "Art",
    characters: "Role",
    scenes: "Scene",
    historical: "Hist",
    documents: "Doc",
    other: "More"
  };

  fetch("data.json")
    .then(res => {
      if (!res.ok) throw new Error("data.json load failed");
      return res.json();
    })
    .then(init)
    .catch(err => {
      el.gallery.innerHTML = `<div class="empty">无法加载 data.json：${escapeHtml(err.message)}</div>`;
    });

  function init(data) {
    state.data = data;
    state.cases = data.cases || [];
    state.templates = data.templates || [];
    state.categories = data.meta?.categories || {};

    el.statCases.textContent = data.meta?.total_cases || state.cases.length;
    el.statCats.textContent = Object.keys(state.categories).length;
    el.statTpls.textContent = data.meta?.total_templates || state.templates.length;
    el.generatedAt.textContent = data.meta?.generated ? `Generated ${data.meta.generated}` : "";

    renderCategories();
    renderTemplates();
    applyFilters();
  }

  function renderCategories() {
    const counts = {};
    for (const item of state.cases) counts[item.category] = (counts[item.category] || 0) + 1;

    const rows = [
      { id: "all", name: "全部案例", count: state.cases.length },
      ...Object.entries(state.categories)
        .filter(([id, meta]) => (counts[id] || meta.count || 0) > 0)
        .map(([id, meta]) => ({ id, name: meta.name || id, count: counts[id] || meta.count || 0 }))
    ];

    el.categoryList.innerHTML = rows.map(cat => `
      <button class="cat${cat.id === state.activeCategory ? " active" : ""}" type="button" data-cat="${cat.id}">
        <span>${catIcons[cat.id] || "Cat"}</span>
        <span class="cat-name">${escapeHtml(cat.name)}</span>
        <span class="cat-count">${cat.count}</span>
      </button>
    `).join("");

    el.categoryList.querySelectorAll(".cat").forEach(btn => {
      btn.addEventListener("click", () => {
        state.activeCategory = btn.dataset.cat;
        renderCategories();
        applyFilters();
      });
    });
  }

  function applyFilters() {
    const query = state.query.trim().toLowerCase();
    state.filtered = state.cases.filter(item => {
      const catOk = state.activeCategory === "all" || item.category === state.activeCategory;
      if (!catOk) return false;
      if (!query) return true;
      return [item.title, item.alt, item.source, item.prompt]
        .filter(Boolean)
        .some(value => String(value).toLowerCase().includes(query));
    });
    renderGallery();
    updateToolbar();
  }

  function updateToolbar() {
    el.resultCount.textContent = state.view === "gallery" ? state.filtered.length : state.templates.length;
    const activeName = state.activeCategory === "all" ? "全部分类" : state.categories[state.activeCategory]?.name || state.activeCategory;
    el.activeLabel.textContent = state.view === "gallery" ? `· ${activeName}` : "· 模板库";
  }

  function renderGallery() {
    if (state.view !== "gallery") return;
    if (!state.filtered.length) {
      el.gallery.innerHTML = `<div class="empty">没有找到匹配内容。换个关键词或分类试试。</div>`;
      return;
    }
    el.gallery.innerHTML = state.filtered.map((item, index) => {
      const catName = state.categories[item.category]?.name || item.category || "未分类";
      return `
        <button class="card" type="button" data-index="${index}" aria-label="打开案例 ${item.id}">
          <img class="thumb" src="../data/images/${encodeURI(item.image || "")}" alt="${escapeHtml(item.alt || item.title || "")}" loading="lazy" decoding="async">
          <div class="card-body">
            <span class="case-id">#${String(item.id).padStart(3, "0")}</span>
            <h2>${escapeHtml(item.title || "未命名案例")}</h2>
            <div class="source">${escapeHtml(catName)} · ${escapeHtml(item.source || "未提供来源")}</div>
          </div>
        </button>
      `;
    }).join("");

    el.gallery.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => openModal(Number(card.dataset.index)));
    });
  }

  function renderTemplates() {
    el.templates.innerHTML = state.templates.map((tpl, index) => `
      <article class="template-card">
        <h2>${escapeHtml(tpl.category || tpl.id || `模板 ${index + 1}`)}</h2>
        <p>${escapeHtml(excerpt(tpl.text_template || "", 180))}</p>
        <div class="template-actions">
          <button class="mini-btn" type="button" data-copy-template="${index}">复制文本模板</button>
          ${tpl.json_template ? `<button class="mini-btn" type="button" data-copy-json="${index}">复制 JSON 模板</button>` : ""}
        </div>
      </article>
    `).join("");

    el.templates.querySelectorAll("[data-copy-template]").forEach(btn => {
      btn.addEventListener("click", () => copyText(state.templates[Number(btn.dataset.copyTemplate)].text_template || ""));
    });
    el.templates.querySelectorAll("[data-copy-json]").forEach(btn => {
      btn.addEventListener("click", () => copyText(state.templates[Number(btn.dataset.copyJson)].json_template || ""));
    });
  }

  function openModal(index) {
    const item = state.filtered[index];
    if (!item) return;
    state.modalIndex = index;
    const catName = state.categories[item.category]?.name || item.category || "未分类";
    el.modalImage.src = `../data/images/${encodeURI(item.image || "")}`;
    el.modalImage.alt = item.alt || item.title || "";
    el.modalInfo.innerHTML = `
      <span class="case-id">#${String(item.id).padStart(3, "0")}</span>
      <h2>${escapeHtml(item.title || "未命名案例")}</h2>
      <div class="modal-meta">
        <div>分类：${escapeHtml(catName)}</div>
        <div>来源：${escapeHtml(item.source || "未提供")}</div>
        <div>类型：${escapeHtml(item.prompt_type || "text")}</div>
      </div>
      <pre class="prompt">${escapeHtml(item.prompt || "")}</pre>
      <div class="template-actions">
        <button class="mini-btn" type="button" id="copyPrompt">复制提示词</button>
      </div>
    `;
    document.getElementById("copyPrompt").addEventListener("click", () => copyText(item.prompt || ""));
    el.modalLayer.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    el.modalLayer.classList.remove("open");
    document.body.style.overflow = "";
    state.modalIndex = -1;
  }

  function moveModal(direction) {
    if (!state.filtered.length || state.modalIndex < 0) return;
    const next = (state.modalIndex + direction + state.filtered.length) % state.filtered.length;
    openModal(next);
  }

  function setView(view) {
    state.view = view;
    const isGallery = view === "gallery";
    el.galleryTab.classList.toggle("active", isGallery);
    el.templateTab.classList.toggle("active", !isGallery);
    el.categoryList.style.display = isGallery ? "" : "none";
    el.searchInput.disabled = !isGallery;
    el.gallery.style.display = isGallery ? "grid" : "none";
    el.templates.style.display = isGallery ? "none" : "grid";
    if (isGallery) renderGallery();
    updateToolbar();
  }

  let searchTimer;
  el.searchInput.addEventListener("input", () => {
    clearTimeout(searchTimer);
    el.clearSearch.classList.toggle("visible", el.searchInput.value.length > 0);
    searchTimer = setTimeout(() => {
      state.query = el.searchInput.value;
      applyFilters();
    }, 120);
  });
  el.clearSearch.addEventListener("click", () => {
    el.searchInput.value = "";
    state.query = "";
    el.clearSearch.classList.remove("visible");
    applyFilters();
    el.searchInput.focus();
  });

  el.galleryTab.addEventListener("click", () => setView("gallery"));
  el.templateTab.addEventListener("click", () => setView("templates"));
  el.modalClose.addEventListener("click", closeModal);
  el.modalPrev.addEventListener("click", () => moveModal(-1));
  el.modalNext.addEventListener("click", () => moveModal(1));
  el.modalLayer.addEventListener("click", event => {
    if (event.target === el.modalLayer) closeModal();
  });
  document.addEventListener("keydown", event => {
    if (!el.modalLayer.classList.contains("open")) return;
    if (event.key === "Escape") closeModal();
    if (event.key === "ArrowLeft") moveModal(-1);
    if (event.key === "ArrowRight") moveModal(1);
  });

  function excerpt(text, length) {
    const normalized = String(text).replace(/\s+/g, " ").trim();
    return normalized.length > length ? `${normalized.slice(0, length)}...` : normalized;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function copyText(text) {
    navigator.clipboard?.writeText(text).then(showToast).catch(() => {
      const area = document.createElement("textarea");
      area.value = text;
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      area.remove();
      showToast();
    });
  }

  let toastTimer;
  function showToast() {
    el.toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.toast.classList.remove("show"), 1500);
  }
})();
</script>
</body>
</html>
